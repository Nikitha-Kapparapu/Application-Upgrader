plugins {
    id 'java'
    id 'application'
}

application {
    mainClass = 'com.upgrader.ProjectScanner'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.github.javaparser:javaparser-core:3.25.8'
}

jar {
    manifest {
        attributes 'Main-Class': 'com.upgrader.ProjectScanner'
    }
    from {
        configurations.runtimeClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}
